{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Glotech High School System</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center px-4">
    <div class="max-w-2xl w-full text-center">
        <!-- Error Icon -->
        <div class="mb-8">
            <i class="fas fa-exclamation-triangle text-yellow-400 text-8xl animate-pulse"></i>
        </div>
        
        <!-- Error Code -->
        <h1 class="text-9xl font-bold text-white mb-4">404</h1>
        
        <!-- Error Message -->
        <h2 class="text-3xl font-semibold text-white mb-4">Page Not Found</h2>
        <p class="text-xl text-gray-300 mb-8">
            Sorry, the page you're looking for doesn't exist or has been moved.
        </p>
        
        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="inline-flex items-center justify-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors">
                <i class="fas fa-home mr-2"></i>
                Go to Homepage
            </a>
            <button onclick="history.back()" class="inline-flex items-center justify-center px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white font-semibold rounded-lg transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>
                Go Back
            </button>
        </div>
        
        <!-- Help Text -->
        <div class="mt-12 text-gray-400">
            <p class="mb-2">Need help? Contact your system administrator.</p>
            <p class="text-sm">Error Code: 404 - Resource Not Found</p>
        </div>
    </div>
</body>
</html>
